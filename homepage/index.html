<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUIZZIE - Mediawijsheid</title>
<link rel="stylesheet" href="/style/style.css">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<header>
    <a href="/homepage/index.html">
    <img src="/images/download.png" class="logo" alt="QUIZZIE Logo">
    </a>

    <nav>
        <a href="/homepage/index.html">Home</a>
        <a href="/team/team.html">Team</a>
    </nav>
</header>

<main>
    <div class="welcome-block">
        <h1>Welkom bij QUIZZIE Mediawijsheid</h1>
        <p>Leer alles over mediawijsheid op een leuke, interactieve en speelse manier!</p>

      <label>Vul je naam in:</label>
<input type="text" id="player-name" placeholder="Jouw naam">

<button id="start-btn">Start</button>

        <br><br>

        <p>Kies een quiz om te starten:</p>

        <div class="quiz-sectie">

            <div class="quiz-blok">
                <h3>Quiz 1</h3>
                <button class="quiz-btn" data-quiz="/quiz-paginas/quiz_kai.html">Nepnieuws herkennen</button>
            </div>

            <div class="quiz-blok">
                <h3>Quiz 2</h3>
                <button class="quiz-btn" data-quiz="/quiz-paginas/quiz_nikhil.html">Invloed Social Media</button>
            </div>

            <div class="quiz-blok">
                <h3>Quiz 3</h3>
                <button class="quiz-btn" data-quiz="/quiz-paginas/quiz_carlos.html">Privacy & Online Veiligheid</button>
            </div>

        </div>
    </div>
</main>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const nameInput = document.getElementById("player-name");
    const startBtn = document.getElementById("start-btn");
    const quizSection = document.querySelector(".quiz-sectie");
    const buttons = document.querySelectorAll(".quiz-btn");

 
    buttons.forEach(btn => btn.disabled = true);


    startBtn.addEventListener("click", () => {
        const name = nameInput.value.trim();

        if (name === "") {
            alert("Vul eerst je naam in!");
            return;
        }

   
        localStorage.setItem("playerName", name);


        quizSection.style.display = "flex";

 
        buttons.forEach(btn => btn.disabled = false);


        startBtn.style.display = "none";
        nameInput.disabled = true;
    });

    // Quiz-knoppen gedrag
    buttons.forEach(btn => {
        btn.addEventListener("click", () => {
            const name = nameInput.value.trim();

            if (name === "") {
                alert("Vul eerst je naam in!");
                return;
            }

            window.location.href = btn.getAttribute("data-quiz");
        });
    });
});
</script>



</body>
</html>
